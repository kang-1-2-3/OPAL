name: kitti 
loading:
  pc_data_dir: "/home/data_sata/Pcmaploc/data/kitti/data_odometry_velodyne/dataset"
  kitti360_data_dir: "/home/data_sata/CVGL_data/KITTI360/data_3d_raw"
  # osm_data_dir: "./data_osm/osm/karlsruhe.osm"
  gps_data_dir: "./data/kitti"
  dataset_split:
    train: ['01', '02', '04', '05', '06', '08', '09', '10']
    val: ['00']
tiling:
  tiles_path: "./data/kitti"
  tile_margin: 100
model:
  map_encoder:
    embedding_dim: 16
    num_classes: 
      areas: 7
      ways: 10
      nodes: 33

training:
  num_workers: 8
  device: "cuda:0"
  seed: 42
  checkpoint_dir: "checkpoints"
  num_epochs: 50
  lr: 0.001
  weight_decay: 0.00001
  log_dir: "runs"
  batch_size: 16
