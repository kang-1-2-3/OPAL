name: kitti 
loading:
  pc_data_dir: "D:\\Research\\Dataset\\KITTI_odometry\\data_odometry_velodyne\\dataset"
  osm_data_dir: "D:\\GitHub\\geo-localization-with-point-clouds-and-openstreetmap\\data_osm\\osm\\karlsruhe.osm"
  gps_data_dir: "maploc\\data\\kitti"
  train: 
    batch_size: 4
  dataset_split:
    train: ['04', '05', '06', '07', '08', '09', '10']
    val: ['02']
    train: ['00']
tiling:
  tiles_path: "maploc\\data\\kitti"
  tile_margin: 64
model:
    map_encoder:
      embedding_dim: 16
      output_dim: 8
      num_classes: 
        areas: 7
        ways: 10
        nodes: 33
      backbone:
        encoder: vgg19
        pretrained: false
        output_scales: [0]
        num_downsample: 3
        decoder: [128, 64, 64]
        padding: replicate
      unary_prior: false
training:
  early_stop:
    patience: 5
  num_epochs: 30
  lr: 0.001
  weight_decay: 0.0001
  log_dir: "runs"
  batch_size: 4
  val_per_step_num: 1000