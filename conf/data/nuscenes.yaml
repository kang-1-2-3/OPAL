name: nuscenes 
loading:
xbound: [-30.0, 30.0, 0.15]
ybound: [-15.0, 15.0, 0.15]
zbound: [-10.0, 10.0, 20.0]
image_size: [128, 352]
num_channels: 16
thickness: 5
tiling:
  tiles_path: "./maploc/data/nuscenes"
  tile_margin: 80
model:
    map_encoder:
      embedding_dim: 16
      output_dim: 8
      num_classes: 
        areas: 7
        ways: 10
        nodes: 33
      backbone:
        encoder: vgg19
        pretrained: false
        output_scales: [0]
        num_downsample: 3
        decoder: [128, 64, 64]
        padding: replicate
      unary_prior: false
training:
  num_workers: 4
  device: "cuda:0"
  seed: 42
  checkpoint_dir: "checkpoints"
  # device: "cpu"
  early_stop:
    patience: 5
  num_epochs: 200
  lr: 0.00001
  weight_decay: 0.00001
  log_dir: "runs"
  batch_size: 4
  # val_per_step_num: 2000
